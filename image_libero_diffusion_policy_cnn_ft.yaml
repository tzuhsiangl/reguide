_target_: diffusion_policy.workspace.train_diffusion_unet_hybrid_continual_workspace.TrainDiffusionUnetHybridContinualWorkspace

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    format_str: epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt
    k: 5
    mode: max
    monitor_key: test_mean_score
dataloader:
  batch_size: 128
  num_workers: 0
  persistent_workers: false
  pin_memory: true
  shuffle: true
dataset_obs_steps: 2
ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0
exp_name: default
horizon: 32
keypoint_visible_rate: 1.0
logging:
  group: null
  id: null
  mode: online
  name: ${now:%Y.%m.%d}_${now:%H.%M.%S}_train_diffusion_unet_hybrid_libero_continual
  project: diffusion_policy_libero_continual
  resume: false
  tags:
  - train_diffusion_unet_hybrid
  - libero_image
  - continual
multi_run:
  run_dir: data/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}_train_diffusion_unet_hybrid_libero_continual
  wandb_name_base: ${now:%Y-%m-%d}_${now:%H-%M-%S}_train_diffusion_unet_hybrid_libero_continual
n_action_steps: 15
n_latency_steps: 0
n_obs_steps: 2
name: train_diffusion_unet_hybrid_libero_continual
obs_as_global_cond: true
optimizer:
  _target_: torch.optim.AdamW
  betas:
  - 0.95
  - 0.999
  eps: 1.0e-08
  lr: 0.0001
  weight_decay: 1.0e-06
past_action_visible: false

policy:
  _target_: diffusion_policy.policy.diffusion_unet_hybrid_image_policy.DiffusionUnetHybridImagePolicy
  cond_predict_scale: true
  crop_shape:
  - 114
  - 114
  diffusion_step_embed_dim: 128
  down_dims:
  - 512
  - 1024
  - 2048
  eval_fixed_crop: true
  horizon: 32
  kernel_size: 5
  n_action_steps: 15
  n_groups: 8
  n_obs_steps: 2
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    beta_start: 0.0001
    clip_sample: true
    num_train_timesteps: 100
    prediction_type: epsilon
    variance_type: fixed_small
  num_inference_steps: 100
  obs_as_global_cond: true
  obs_encoder_group_norm: true
  shape_meta:
    action:
      shape:
      - 10
    obs:
      agentview_rgb: { shape: [3, 128, 128], type: rgb }
      ee_ori:        { shape: [4] }
      ee_pos:        { shape: [3] }
      joint_states:  { shape: [7] }
      language:      { shape: [15] }

shape_meta:
  action:
    shape:
    - 10
  obs:
    agentview_rgb: { shape: [3, 128, 128], type: rgb }
    ee_ori:        { shape: [4] }
    ee_pos:        { shape: [3] }
    joint_states:  { shape: [7] }
    language:      { shape: [15] }

task:
  abs_action: true
  dataset:
    _target_: diffusion_policy.dataset.libero_mixed_image_dataset.LiberoMixedImageDataset
    abs_action: true
    expert_dataset_path: path/to/expert_demos.hdf5
    rollout_dataset_path: path/to/rollouts_success.hdf5
    expert_sample_weight: 0.7
    rollout_reuse_rate: 1
    rollout_language_goal: null
    language_emb_model: clip
    horizon: 32
    n_obs_steps: 2
    pad_after: 7
    pad_before: 1
    rotation_rep: rotation_6d
    seed: 42
    shape_meta: ${task.shape_meta}
    use_cache: true
    val_ratio: 0.0
  dataset_path: path/to/training_data.hdf5
  env_runner:
    _target_: diffusion_policy.env_runner.libero_image_runner.LiberoImageRunner
    abs_action: true
    crf: 22
    dataset_path: path/to/training_data.hdf5
    fps: 10
    max_steps: 500
    n_action_steps: 15
    n_envs: 3
    n_obs_steps: 2
    n_test: 2
    n_test_vis: 2
    n_train: 1
    n_train_vis: 1
    past_action: false
    render_obs_key: agentview_image
    shape_meta:
      action: { shape: [10] }
      obs:
        agentview_image:    { shape: [3, 128, 128], type: rgb }
        robot0_eef_quat:    { shape: [4] }
        robot0_eef_pos:     { shape: [3] }
        robot0_joint_pos:   { shape: [7] }
    test_start_seed: 100000
    tqdm_interval_sec: 1.0
    train_start_idx: 0
  name: libero_image
  shape_meta:
    action: { shape: [10] }
    obs:
      agentview_rgb: { shape: [3, 128, 128], type: rgb }
      ee_ori:        { shape: [4] }
      ee_pos:        { shape: [3] }
      joint_states:  { shape: [7] }
      language:      { shape: [15] }
  task_name: libero

task_name: libero_image_continual

